general {
    disable_loading_bar = true
    hide_cursor = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.02
    contrast = 1.1
    brightness = 0.9
}

# Імʼя користувача зверху
label {
    monitor =
    text = $USER
    font_size = 32
    color = rgba(255,255,255,0.95)

    position = 0, 120
    halign = center
    valign = top
}

# Поле вводу пароля
input-field {
    monitor =
    size = 300, 55
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    dots_rounding = -1

    outer_color = rgba(255,255,255,0.25)
    inner_color = rgba(30,30,30,0.6)
    font_color = rgba(255,255,255,0.95)

    fade_on_empty = true
    placeholder_text = Enter password
    hide_input = false

    position = 0, -20
    halign = center
    valign = center
}
